# compose/infra.yml — Services d'infrastructure partagée
# postgres, redis, minio, clickhouse, qdrant
# Tous sur le réseau aiws. Variables depuis .env — zéro valeur en dur.

services:

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TZ: ${TZ:-UTC}
      # Variables transmises à init-multi-db.sh (monté dans /docker-entrypoint-initdb.d/)
      # Chaque brique reçoit son user + password + nom de base
      AUTHENTIK_DB_USER: ${AUTHENTIK_DB_USER:-authentik}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_DB_NAME: ${AUTHENTIK_DB_NAME:-authentik}
      DIFY_DB_USER: ${DIFY_DB_USER:-dify}
      DIFY_DB_PASSWORD: ${DIFY_DB_PASSWORD}
      DIFY_DB_NAME: ${DIFY_DB_NAME:-dify}
      LANGFUSE_DB_USER: ${LANGFUSE_DB_USER:-langfuse}
      LANGFUSE_DB_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      LANGFUSE_DB_NAME: ${LANGFUSE_DB_NAME:-langfuse}
      INFISICAL_DB_USER: ${INFISICAL_DB_USER:-infisical}
      INFISICAL_DB_PASSWORD: ${INFISICAL_DB_PASSWORD}
      INFISICAL_DB_NAME: ${INFISICAL_DB_NAME:-infisical}
      COMPAI_DB_USER: ${COMPAI_DB_USER:-compai}
      COMPAI_DB_PASSWORD: ${COMPAI_DB_PASSWORD}
      COMPAI_DB_NAME: ${COMPAI_DB_NAME:-compai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script d'initialisation multi-bases (dify, langfuse, infisical, compai, authentik)
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aiws

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - aiws

  # ─── MinIO (stockage objet S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: ${TZ:-UTC}
    volumes:
      - minio_data:/data
    ports:
      # API S3 — interne uniquement (pas de label Traefik, accès via réseau aiws)
      - "127.0.0.1:9000:9000"
      # Console MinIO — exposée localement pour administration
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - aiws

  # ─── ClickHouse (analytics Langfuse) ─────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:26.4-alpine
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-langfuse}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      TZ: ${TZ:-UTC}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user ${CLICKHOUSE_USER:-langfuse} --password ${CLICKHOUSE_PASSWORD} --query 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - aiws

  # ─── Qdrant (vector store Dify) ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      TZ: ${TZ:-UTC}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - aiws

networks:
  aiws:
    external: true

volumes:
  postgres_data:
    external: true
  redis_data:
    external: true
  minio_data:
    external: true
  clickhouse_data:
    external: true
  qdrant_data:
    external: true
