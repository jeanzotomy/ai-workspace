# compose/traefik.yml — Reverse proxy Traefik v3.7.5
# Entrypoints web(80)→HTTPS redirect, websecure(443) TLS ACME.
# Dashboard protégé par forwardAuth Authentik.
# Provider file : proxy/dynamic/ (middlewares, forwardAuth, en-têtes sécurité).

services:

  traefik:
    image: traefik:v3.7.5
    container_name: traefik
    restart: unless-stopped
    command:
      # Entrées réseau
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      # TLS ACME Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      # Provider Docker
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=aiws"
      # Provider file (middlewares dynamiques)
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # API & Dashboard (port interne 8080 — non exposé sur l'hôte)
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Logs
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"
      - "--accesslog.format=json"
      # Ping healthcheck
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
      - ./proxy/dynamic:/etc/traefik/dynamic:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # Dashboard Traefik — protégé par forwardAuth Authentik
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=authentik-forwardauth@file,security-headers@file"
    networks:
      - aiws

networks:
  aiws:
    external: true

volumes:
  traefik_acme:
    external: true
