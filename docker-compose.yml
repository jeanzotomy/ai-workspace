# docker-compose.yml — AI Workspace racine
# Agrège tous les services via include: + déclare le réseau et les volumes partagés.
# Ne PAS modifier les noms des services (définis dans ARCHITECTURE.md §3 — immuables).

include:
  - compose/infra.yml
  - compose/traefik.yml
  - compose/authentik.yml
  - compose/dify.yml
  - compose/open-webui.yml
  - compose/langfuse.yml
  - compose/infisical.yml
  - compose/portal.yml
  - compose/comp-ai.yml

networks:
  # Réseau externe créé à l'amorçage (scripts/bootstrap.sh ou `make up`).
  # external:true sur TOUS les fichiers (racine + compose/*.yml) pour la cohérence include:.
  aiws:
    external: true

volumes:
  # Tous les volumes sont créés en externe au bootstrap (external: true partout pour
  # cohérence avec les fichiers compose/*.yml inclus — sinon conflit de merge).
  # Infra partagée
  postgres_data:
    external: true
  redis_data:
    external: true
  minio_data:
    external: true
  clickhouse_data:
    external: true
  qdrant_data:
    external: true
  # Traefik
  traefik_acme:
    external: true
  # Authentik
  authentik_media:
    external: true
  authentik_certs:
    external: true
  # Open WebUI
  open_webui_data:
    external: true
  # Infisical
  infisical_data:
    external: true
  # Comp AI
  comp_ai_data:
    external: true
