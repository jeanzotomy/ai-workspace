# nginx.conf — Portail AI Workspace
# Config minimale : gzip, cache, security headers, port 80
# Pas de SSR/proxy — fichiers statiques uniquement

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs structurés
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;      # Ne pas exposer la version nginx

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        # CSP : tout est local, pas de CDN externe
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none';" always;

        # Page principale
        location = / {
            try_files /index.html =404;
            # Pas de cache sur le HTML (contient __DOMAIN__ substitué)
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Assets statiques — cache long terme
        location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff|woff2|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Healthcheck endpoint (pour Traefik / Docker healthcheck)
        location = /health {
            access_log off;
            add_header Content-Type "text/plain" always;
            return 200 "ok\n";
        }

        # Bloquer les fichiers cachés
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Fallback 404 sobre
        error_page 404 /index.html;
    }
}
