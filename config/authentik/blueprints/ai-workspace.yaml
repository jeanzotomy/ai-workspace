# =============================================================================
# config/authentik/blueprints/ai-workspace.yaml
# =============================================================================
# Blueprint Authentik — Providers OIDC/OAuth + Proxy (forwardAuth) + Applications
# pour l'AI Workspace. Compatible Authentik 2026.5.3.
#
# MONTAGE :
#   ./config/authentik/blueprints est monté dans /blueprints/custom/ des conteneurs
#   authentik-server et authentik-worker (via docker-compose.override.yml — le chemin
#   dans compose/authentik.yml se résout mal à cause du bug include:).
#   Authentik découvre et applique automatiquement les blueprints de /blueprints/custom/.
#
# DOMAINE :
#   Les URLs sont construites depuis la variable d'env AIWS_DOMAIN (passée aux
#   conteneurs via l'override), défaut "aiws.localhost".
#
# STRATÉGIE SSO PAR BRIQUE (voir README §Matrice SSO) :
#   - Open WebUI, Langfuse, Comp AI : OIDC natif  → oauth2provider
#   - Dify CE, Infisical OSS, Traefik dashboard   → proxy (forwardAuth via outpost embarqué)
#
# APRÈS APPLICATION (OIDC natif) :
#   Les client_id / client_secret sont générés par Authentik. Les reporter dans .env :
#     OPENWEBUI_OIDC_CLIENT_ID / _SECRET
#     LANGFUSE_OIDC_CLIENT_ID  / _SECRET
#     COMPAI_OIDC_CLIENT_ID    / _SECRET
#   (le script scripts/sync-oidc-secrets.sh automatise cette extraction).
# =============================================================================

version: 1
metadata:
  name: AI Workspace — Providers OIDC, Proxy et Applications

context:
  domain: !Env [AIWS_DOMAIN, "aiws.localhost"]

entries:

  # ===========================================================================
  # GROUPES — Contrôle d'accès
  # ===========================================================================

  - model: authentik_core.group
    state: present
    identifiers:
      name: ai-workspace-users
    attrs:
      is_superuser: false

  - model: authentik_core.group
    state: present
    identifiers:
      name: ai-workspace-admins
    attrs:
      is_superuser: false

  # ===========================================================================
  # 1. OPEN WEBUI — OIDC natif
  #    Callback : https://chat.<domain>/oauth/oidc/callback
  # ===========================================================================

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: provider-open-webui
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      include_claims_in_id_token: true
      sub_mode: hashed_user_id
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Format ["https://chat.%s/oauth/oidc/callback", !Context domain]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      access_token_validity: hours=1
      refresh_token_validity: days=30

  - model: authentik_core.application
    state: present
    identifiers:
      slug: open-webui
    attrs:
      name: Open WebUI
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, provider-open-webui]]
      meta_icon: https://raw.githubusercontent.com/open-webui/open-webui/refs/heads/main/static/favicon.png
      meta_description: "Interface de chat LLM unifiée"
      policy_engine_mode: any
      group: AI

  # ===========================================================================
  # 2. LANGFUSE — OIDC natif (AUTH_CUSTOM_* via NextAuth)
  #    Callback : https://observe.<domain>/api/auth/callback/custom
  #    Issuer   : https://auth.<domain>/application/o/langfuse/
  # ===========================================================================

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: provider-langfuse
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      include_claims_in_id_token: true
      sub_mode: hashed_user_id
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Format ["https://observe.%s/api/auth/callback/custom", !Context domain]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      access_token_validity: hours=1
      refresh_token_validity: days=30

  - model: authentik_core.application
    state: present
    identifiers:
      slug: langfuse
    attrs:
      name: Langfuse
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, provider-langfuse]]
      meta_icon: https://langfuse.com/favicon.ico
      meta_description: "Observabilité LLM — traces, coûts, évaluations"
      policy_engine_mode: any
      group: AI

  # ===========================================================================
  # 3. COMP AI — OIDC natif (NextAuth)  [service optionnel, désactivé en local]
  #    Callback : https://compliance.<domain>/api/auth/callback/authentik
  # ===========================================================================

  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: provider-comp-ai
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      include_claims_in_id_token: true
      sub_mode: hashed_user_id
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Format ["https://compliance.%s/api/auth/callback/authentik", !Context domain]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      access_token_validity: hours=1
      refresh_token_validity: days=30

  - model: authentik_core.application
    state: present
    identifiers:
      slug: comp-ai
    attrs:
      name: Comp AI
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, provider-comp-ai]]
      meta_icon: https://comp.ai/favicon.ico
      meta_description: "Conformité SOC 2 / ISO 27001 / RGPD"
      policy_engine_mode: any
      group: Gouvernance

  # ===========================================================================
  # 4. DIFY — Proxy provider (forwardAuth Traefik, pas d'OIDC natif en CE)
  # ===========================================================================

  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: provider-dify-forwardauth
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      external_host: !Format ["https://dify.%s", !Context domain]
      cookie_domain: !Context domain
      access_token_validity: hours=24

  - model: authentik_core.application
    state: present
    identifiers:
      slug: dify
    attrs:
      name: Dify
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, provider-dify-forwardauth]]
      meta_icon: https://dify.ai/favicon.ico
      meta_description: "Orchestration IA — RAG, agents, workflows"
      policy_engine_mode: any
      group: AI

  # ===========================================================================
  # 5. INFISICAL — Proxy provider (forwardAuth, OIDC = tier payant en OSS)
  # ===========================================================================

  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: provider-infisical-forwardauth
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      external_host: !Format ["https://secrets.%s", !Context domain]
      cookie_domain: !Context domain
      access_token_validity: hours=24

  - model: authentik_core.application
    state: present
    identifiers:
      slug: infisical
    attrs:
      name: Infisical
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, provider-infisical-forwardauth]]
      meta_icon: https://infisical.com/favicon.ico
      meta_description: "Gestionnaire de secrets — clés LLM, variables env"
      policy_engine_mode: any
      group: Gouvernance

  # ===========================================================================
  # 6. TRAEFIK DASHBOARD — Proxy provider (forwardAuth, admin only)
  # ===========================================================================

  - model: authentik_providers_proxy.proxyprovider
    state: present
    identifiers:
      name: provider-traefik-dashboard
    attrs:
      authentication_flow: !Find [authentik_flows.flow, [slug, default-authentication-flow]]
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      mode: forward_single
      external_host: !Format ["https://traefik.%s", !Context domain]
      cookie_domain: !Context domain
      access_token_validity: hours=8

  - model: authentik_core.application
    state: present
    identifiers:
      slug: traefik-dashboard
    attrs:
      name: Traefik Dashboard
      provider: !Find [authentik_providers_proxy.proxyprovider, [name, provider-traefik-dashboard]]
      meta_icon: https://traefik.io/favicon.ico
      meta_description: "Dashboard reverse proxy (admin uniquement)"
      policy_engine_mode: any
      group: Gouvernance

  # ===========================================================================
  # 7. OUTPOST EMBARQUÉ — liaison des proxy providers
  #    Sans cette liaison, l'endpoint /outpost.goauthentik.io/auth/traefik
  #    renvoie 404 (l'outpost ne connaît pas les applications proxy).
  # ===========================================================================

  - model: authentik_outposts.outpost
    state: present
    identifiers:
      managed: goauthentik.io/outposts/embedded
    attrs:
      name: authentik Embedded Outpost
      type: proxy
      # authentik_host doit pointer vers l'URL publique de l'IdP, sinon le proxy
      # redirige vers http://localhost (cassé en navigateur).
      config:
        authentik_host: !Format ["https://auth.%s", !Context domain]
        authentik_host_browser: !Format ["https://auth.%s", !Context domain]
        authentik_host_insecure: false
        log_level: info
        object_naming_template: "ak-outpost-%(name)s"
      providers:
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-dify-forwardauth]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-infisical-forwardauth]]
        - !Find [authentik_providers_proxy.proxyprovider, [name, provider-traefik-dashboard]]
